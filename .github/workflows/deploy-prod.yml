name: Deploy — Prod

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deploy'
        required: true

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  validate:
    name: Validate confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "deploy" ]; then
            echo "❌ Confirmation must be 'deploy', got: ${{ inputs.confirm }}"
            exit 1
          fi
          echo "✅ Confirmation accepted"

  deploy:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via deploy-prod.sh
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST_PROD }}
          username: ${{ secrets.DEPLOY_USER_PROD }}
          key: ${{ secrets.DEPLOY_SSH_KEY_PROD }}
          port: ${{ secrets.DEPLOY_PORT_PROD }}
          command_timeout: 15m
          script: |
            source ~/.nvm/nvm.sh
            cd ~/aklab
            bash scripts/deploy-prod.sh --ci

      - name: Verify production
        run: |
          sleep 20
          for endpoint in \
            "https://aklab.tirobots.ru/" \
            "https://api-aklab.tirobots.ru/_health" \
            "https://api-aklab.tirobots.ru/admin"; do
            STATUS=$(curl -sS -o /dev/null -w '%{http_code}' -m 15 "$endpoint" 2>/dev/null || echo "000")
            echo "$endpoint → $STATUS"
            if [ "$STATUS" = "000" ] || [ "$STATUS" = "502" ] || [ "$STATUS" = "503" ]; then
              echo "❌ Production verification failed"
              exit 1
            fi
          done
          echo "✅ Production verification passed"

      - name: Notify
        if: always()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST_PROD }}
          username: ${{ secrets.DEPLOY_USER_PROD }}
          key: ${{ secrets.DEPLOY_SSH_KEY_PROD }}
          port: ${{ secrets.DEPLOY_PORT_PROD }}
          command_timeout: 1m
          script: |
            source ~/.nvm/nvm.sh
            cd ~/aklab
            VERSION=$(node -p "require('./package.json').version")

            if [ "${{ job.status }}" = "success" ]; then
              bash scripts/notify-deploy.sh success prod "$VERSION"
            else
              bash scripts/notify-deploy.sh failure prod "$VERSION" "" "Production deploy failed"
            fi
