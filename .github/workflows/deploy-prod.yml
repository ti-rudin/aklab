name: Deploy — Prod

# Auto-deploy отключён — только manual workflow_dispatch
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deploy'
        required: true

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  validate:
    name: Validate confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation (manual only)
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.confirm }}" != "deploy" ]; then
            echo "❌ Confirmation must be 'deploy', got: ${{ inputs.confirm }}"
            exit 1
          fi
          echo "✅ Proceeding with deploy"

  deploy:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50  # Need history for changelog generation

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Bump version & generate changelog
        id: prep
        env:
          XIAOMIMIMO_API_KEY: ${{ secrets.XIAOMIMIMO_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Bump patch version
          CURRENT=$(node -p "require('./package.json').version")
          NEW=$(node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
            const parts = pkg.version.split('.').map(Number);
            parts[2]++;
            pkg.version = parts.join('.');
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log(pkg.version);
          ")
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $CURRENT → $NEW"

          # Generate changelog items (AI first, fallback to rule-based)
          ITEMS=$(node scripts/generate-changelog-ai.js "$NEW" 2>/tmp/changelog-ai.log || echo '')
          if [ -z "$ITEMS" ] || [ "$ITEMS" = '[]' ]; then
            echo "AI changelog empty — fallback to rule-based"
            ITEMS=$(node scripts/generate-changelog.js "$NEW" 2>/tmp/changelog-gen.log || echo '')
          fi

          # Update changelog.json
          if [ -n "$ITEMS" ] && [ "$ITEMS" != '[{"text":"Улучшения стабильности и производительности","type":"improvement"}]' ]; then
            node -e "
              const fs = require('fs');
              const items = JSON.parse(process.argv[1]);
              const changelog = JSON.parse(fs.readFileSync('app/public/changelog.json', 'utf8'));
              // Deduplicate: remove any existing entry with same version
              const filtered = changelog.filter(e => e.version !== 'v$NEW');
              const d = new Date();
              const msk = new Date(d.toLocaleString('en-US', {timeZone:'Europe/Moscow'}));
              const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
              const date = msk.getDate() + ' ' + months[msk.getMonth()] + ' ' + msk.getFullYear();
              const time = String(msk.getHours()).padStart(2,'0') + ':' + String(msk.getMinutes()).padStart(2,'0');
              filtered.unshift({ version: 'v$NEW', date, time, items });
              fs.writeFileSync('app/public/changelog.json', JSON.stringify(filtered, null, 2) + '\n');
              console.log('changelog.json updated: v$NEW (' + items.length + ' items)');
            " "$ITEMS"
          else
            echo "No changelog items generated"
          fi

      - name: Commit & push [release]
        run: |
          VERSION="${{ steps.prep.outputs.version }}"
          git config user.email "deploy@aklab.tirobots.ru"
          git config user.name "AKLAB Deploy"
          git add package.json api/package.json app/package.json app/public/changelog.json
          git commit -m "[release] v${VERSION} -- Deploy production [skip ci]" || echo "Nothing to commit"
          git push origin main

      - name: Deploy via deploy-prod.sh
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST_PROD }}
          username: ${{ secrets.DEPLOY_USER_PROD }}
          key: ${{ secrets.DEPLOY_SSH_KEY_PROD }}
          port: ${{ secrets.DEPLOY_PORT_PROD }}
          command_timeout: 15m
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            cd ~/aklab
            bash scripts/deploy-prod.sh --ci

      - name: Verify production
        run: |
          sleep 20
          for endpoint in \
            "https://aklab.tirobots.ru/" \
            "https://api-aklab.tirobots.ru/_health" \
            "https://api-aklab.tirobots.ru/admin"; do
            STATUS=$(curl -sS -o /dev/null -w '%{http_code}' -m 15 "$endpoint" 2>/dev/null || echo "000")
            echo "$endpoint → $STATUS"
            if [ "$STATUS" = "000" ] || [ "$STATUS" = "502" ] || [ "$STATUS" = "503" ]; then
              echo "❌ Production verification failed"
              exit 1
            fi
          done
          echo "✅ Production verification passed"

      - name: Notify
        if: always()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST_PROD }}
          username: ${{ secrets.DEPLOY_USER_PROD }}
          key: ${{ secrets.DEPLOY_SSH_KEY_PROD }}
          port: ${{ secrets.DEPLOY_PORT_PROD }}
          command_timeout: 1m
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            cd ~/aklab
            VERSION=$(node -p "require('./package.json').version")

            if [ "${{ job.status }}" = "success" ]; then
              bash scripts/notify-deploy.sh success prod "$VERSION"
            else
              bash scripts/notify-deploy.sh failure prod "$VERSION" "" "Production deploy failed"
            fi
